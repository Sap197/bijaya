<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Project — Bijaya</title>
  <style>
    :root{--paper:#FBF6EC;--paper-dark:#F2E9D8;--ink:#21201D;--coral:#FF6B4A;--teal:#1F8A82;}
    *{box-sizing:border-box; margin:0; padding:0;}
    body{font-family:Arial,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 6vw 48px;}
    .page{max-width:900px;margin:0 auto;}
    .back{display:inline-block;margin-bottom:20px;text-decoration:none;font-weight:700;color:var(--teal);} 
    .card{background:var(--paper-dark);border:2px solid var(--ink);border-radius:8px;padding:24px;box-shadow:5px 5px 0 rgba(33,32,29,0.16);} 
    h1{margin-bottom:10px;font-size:2rem;} 
    .tag{display:inline-block;margin-bottom:12px;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--coral);font-weight:700;} 
    .gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:18px;}
    .box{background:var(--paper);border:1px dashed var(--ink);padding:16px;min-height:120px;display:flex;align-items:center;justify-content:center;font-weight:700;color:rgba(33,32,29,0.65);} 
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="index.html">← Back to portfolio</a>
    <div class="card">
      <div class="tag">Design</div>
      <h1>Design Project</h1>
      <p>This page is dedicated to your design work. Replace this text with your branding, UI, or visual identity project details.</p>
      <div class="gallery">
        <div class="box">Mockup 1</div>
        <div class="box">Mockup 2</div>
        <div class="box">Mockup 3</div>
      </div>
    </div>
  </div>
</body>
</html>
