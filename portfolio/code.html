<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Code Project — Bijaya</title>
  <style>
    :root{--paper:#FBF6EC;--paper-dark:#F2E9D8;--ink:#21201D;--coral:#FF6B4A;--teal:#1F8A82;}
    *{box-sizing:border-box; margin:0; padding:0;}
    body{font-family:Arial,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 6vw 48px;}
    .page{max-width:900px;margin:0 auto;}
    .back{display:inline-block;margin-bottom:20px;text-decoration:none;font-weight:700;color:var(--teal);}

    h1{margin-bottom:10px;font-size:2rem;} 
    .tag{display:inline-block;margin-bottom:12px;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--coral);font-weight:700;} 
    .list{margin-top:14px;padding-left:20px;}
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="index.html">← Back to portfolio</a>

      <div class="tag">Code</div>

      <ul class="list">
